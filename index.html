<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING👑 V5 FINAL - COMPACT SIZE</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Kanit', sans-serif; user-select: none; }
        body { margin: 0; padding: 0; background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: white; overflow: hidden; }
        
        /* Loading Screen */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('./4446.png') no-repeat center center; background-size: cover;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10000; transition: 0.5s;
        }
        #loading-screen::before { content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.8); z-index: -1; }
        .loader-logo { font-size: 80px; margin-bottom: 20px; animation: bounce 2s infinite; }
        .loader-bar { width: 200px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        .loader-progress { width: 0%; height: 100%; background: linear-gradient(90deg, #ff0000, #00ff00, #0000ff); background-size: 200%; animation: moveGradient 2s linear infinite; }
        .loader-text { margin-top: 15px; font-size: 14px; font-weight: bold; color: #ffd700; text-shadow: 0 0 10px #ffd700; }

        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes moveGradient { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }

        /* Main Panel */
        #floating-icon {
            position: fixed; top: 20px; right: 20px; width: 55px; height: 55px;
            background: #111; border: 2px solid #00ff00; border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; cursor: pointer; z-index: 9999; box-shadow: 0 0 15px #00ff00;
        }

        .panel { 
            background: url('./4446.png') no-repeat center center; background-size: cover;
            width: 420px; 
            height: 350px; /* ย่อความสูงรวมลงให้กระชับครับ */
            border-radius: 12px; display: none; flex-direction: column; position: relative; 
            border: 1px solid #444; overflow: hidden; transition: 0.3s;
        }
        .panel::before { content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.5); z-index: 0; }
        .panel > * { z-index: 1; }

        @keyframes rgbGlow {
            0% { border-color: #ff0000; box-shadow: 0 0 10px #ff0000; }
            33% { border-color: #00ff00; box-shadow: 0 0 10px #00ff00; }
            66% { border-color: #0000ff; box-shadow: 0 0 10px #0000ff; }
            100% { border-color: #ff0000; box-shadow: 0 0 10px #ff0000; }
        }
        .rgb-active { animation: rgbGlow 3s linear infinite !important; border-width: 2px; }
        .laptop-mode { transform: scale(0.75); }

        .header { height: 45px; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .header-left { display: flex; gap: 8px; }
        .header-title { font-size: 16px; font-weight: bold; color: #ffd700; text-shadow: 0 0 5px #000; }
        .nav-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; width: 30px; height: 30px; border-radius: 5px; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 14px; }

        .main-body { display: flex; flex: 1; overflow: hidden; } /* ล็อก body ไม่ให้หลุด */
        
        .sidebar { 
            width: 110px; background: rgba(0,0,0,0.6); display: flex; flex-direction: column; 
            padding: 10px; gap: 6px; border-right: 1px solid rgba(255,255,255,0.1);
        }
        .side-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 8px 5px; font-size: 12px; font-weight: bold; cursor: pointer; border-radius: 6px; text-align: center; transition: 0.2s; }
        .side-btn.active { background: #00ff00; color: #000; border: 1px solid #00ff00; }

        /* ส่วนที่ย่อให้พอดีกับ Tab ครับ */
        .content { 
            flex: 1; padding: 12px; 
            overflow-y: auto; /* ถ้าของเยอะจะเลื่อนได้เองในกรอบ */
            background: rgba(0,0,0,0.2); 
            max-height: 100%; 
        }

        .menu-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 13px; text-shadow: 1px 1px 2px #000; }
        
        .range-box { margin: 5px 0 10px 0; background: rgba(0,0,0,0.6); padding: 8px; border-radius: 8px; border-left: 3px solid #00ff00; display: none; }
        .slider-range { -webkit-appearance: none; width: 100%; height: 4px; background: #444; border-radius: 5px; outline: none; margin: 8px 0; }
        .slider-range::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: #00ff00; border-radius: 50%; cursor: pointer; }

        .switch { position: relative; width: 34px; height: 18px; display: inline-block; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #333; transition: 0.4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 2px; bottom: 2px; background: white; transition: 0.4s; border-radius: 50%; }
        input:checked + .slider { background: #00ff00; }
        input:checked + .slider:before { transform: translateX(16px); }

        .hidden { display: none !important; }
        .show-block { display: block !important; }
        .info-text { font-size: 12px; line-height: 1.8; color: #fff; }
    </style>
</head>
<body onload="startLoading()">

    <div id="loading-screen">
        <div class="loader-logo">👑</div>
        <div class="loader-bar"><div class="loader-progress" id="progress"></div></div>
        <div class="loader-text" id="status">INITIALIZING... 0%</div>
    </div>

    <div id="floating-icon" class="hidden" onclick="togglePanel(false)">👑</div>

    <div class="panel" id="main-panel">
        <div class="header">
            <div class="header-left">
                <button class="nav-btn" onclick="toggleLaptopMode()">🖥️</button>
                <button class="nav-btn" onclick="window.open('https://discord.gg/K6DSqUPbh')">🌐</button>
            </div>
            <div class="header-title">KING👑 V5</div>
            <div class="header-right">
                <button class="nav-btn" style="background: #ff3333; border: none;" onclick="togglePanel(true)">➖</button>
            </div>
        </div>

        <div class="main-body">
            <div class="sidebar">
                <button class="side-btn active" onclick="showTab('tab-shoot', this)">การยิง</button>
                <button class="side-btn" onclick="showTab('tab-safe', this)">ความปลอดภัย</button>
                <button class="side-btn" onclick="showTab('tab-info', this)">ข้อมูล</button>
                <button class="side-btn" style="color: #ffd700;" onclick="showTab('tab-ui', this)">UI</button>
            </div>

            <div class="content">
                <div id="tab-shoot">
                    <div class="menu-item"><span>บายพาส (Bypass)</span><label class="switch"><input type="checkbox" onchange="playBeep(600, 0.1)"><span class="slider"></span></label></div>
                    
                    <div class="menu-item"><span>ดูดหัว 75%</span><label class="switch"><input type="checkbox" id="aim-toggle" onchange="toggleRange('aim-toggle', 'aim-range-box')"><span class="slider"></span></label></div>
                    <div id="aim-range-box" class="range-box">
                        <div style="font-size: 10px; color: #00ff00; display: flex; justify-content: space-between;"><span>Power</span><span id="aim-val">50%</span></div>
                        <input type="range" min="1" max="100" value="50" class="slider-range" oninput="updateRange(this, 'aim-val')">
                    </div>

                    <div class="menu-item"><span>ล็อกหัว 5%</span><label class="switch"><input type="checkbox" onchange="playBeep(450, 0.1)"><span class="slider"></span></label></div>

                    <div class="menu-item"><span>จอลื่น (Smooth)</span><label class="switch"><input type="checkbox" id="smooth-toggle" onchange="toggleRange('smooth-toggle', 'smooth-range-box')"><span class="slider"></span></label></div>
                    <div id="smooth-range-box" class="range-box">
                        <div style="font-size: 10px; color: #00ff00; display: flex; justify-content: space-between;"><span>Sensitivity</span><span id="smooth-val">50%</span></div>
                        <input type="range" min="1" max="100" value="50" class="slider-range" oninput="updateRange(this, 'smooth-val')">
                    </div>
                </div>

                <div id="tab-safe" class="hidden">
                    <div class="menu-item"><span>กันแบน (Active)</span><label class="switch"><input type="checkbox" checked onchange="playBeep(400, 0.1)"><span class="slider"></span></label></div>
                    <div class="menu-item"><span>กันดำ (Anti-Black)</span><label class="switch"><input type="checkbox" onchange="playBeep(400, 0.1)"><span class="slider"></span></label></div>
                </div>

                <div id="tab-info" class="hidden">
                    <div class="info-text">
                        📱 <span id="phone-model">...</span><br>
                        🆔 <span style="color:#ffd700;">KING V5 FINAL</span><br>
                        👑 <span style="color:#00ff00;">king_rooster002</span><br>
                        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 8px 0;">
                        <span style="font-size: 11px;">"เสร็จสิ้นเวอร์ชันนี้แล้วรอตัวใหม่"</span>
                    </div>
                </div>

                <div id="tab-ui" class="hidden">
                    <div class="menu-item"><span>RGB Mode</span><label class="switch"><input type="checkbox" id="rgb-toggle" onchange="toggleRGB(); playBeep(500, 0.1);"><span class="slider"></span></label></div>
                    <input type="color" id="ui-color-picker" style="width:100%; height:25px; cursor:pointer;" value="#000088">
                    <button style="width:100%; margin-top:5px; background:#00ff00; border:none; padding:6px; border-radius:5px; font-weight:bold; cursor:pointer; font-size: 12px;" onclick="applyColor()">SAVE COLOR</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function startLoading() {
            let prg = document.getElementById('progress');
            let status = document.getElementById('status');
            let width = 0;
            let id = setInterval(() => {
                if (width >= 100) {
                    clearInterval(id);
                    status.innerText = "READY!";
                    setTimeout(() => {
                        document.getElementById('loading-screen').style.opacity = '0';
                        setTimeout(() => {
                            document.getElementById('loading-screen').style.display = 'none';
                            document.getElementById('main-panel').style.display = 'flex';
                        }, 500);
                    }, 400);
                } else {
                    width += 2;
                    prg.style.width = width + '%';
                    status.innerText = "LOADING... " + width + "%";
                }
            }, 40);
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playBeep(freq, duration) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        function toggleRange(switchId, boxId) {
            const isChecked = document.getElementById(switchId).checked;
            document.getElementById(boxId).classList.toggle('show-block', isChecked);
            playBeep(isChecked ? 600 : 300, 0.1);
        }

        function updateRange(el, targetId) {
            document.getElementById(targetId).innerText = el.value + "%";
            playBeep(150 + (el.value * 2), 0.02);
        }

        function showTab(tabId, btn) {
            playBeep(500, 0.05);
            document.getElementById('tab-shoot').classList.add('hidden');
            document.getElementById('tab-safe').classList.add('hidden');
            document.getElementById('tab-info').classList.add('hidden');
            document.getElementById('tab-ui').classList.add('hidden');
            document.querySelectorAll('.side-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.remove('hidden');
            btn.classList.add('active');
        }

        function applyColor() {
            playBeep(700, 0.1);
            const panel = document.getElementById('main-panel');
            panel.style.backgroundImage = "none";
            panel.style.backgroundColor = document.getElementById('ui-color-picker').value;
        }

        function toggleRGB() {
            document.getElementById('main-panel').classList.toggle('rgb-active', document.getElementById('rgb-toggle').checked);
        }

        function toggleLaptopMode() {
            playBeep(450, 0.1);
            document.getElementById('main-panel').classList.toggle('laptop-mode');
        }

        function togglePanel(isMin) {
            document.getElementById('main-panel').classList.toggle('hidden', isMin);
            document.getElementById('floating-icon').classList.toggle('hidden', !isMin);
            playBeep(isMin ? 300 : 600, 0.1);
        }

        document.getElementById('phone-model').innerText = navigator.userAgent.includes("Android") ? navigator.userAgent.split(";")[2].split("Build")[0].trim() : "Mobile Device";
    </script>
</body>
    </html>
